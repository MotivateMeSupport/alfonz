<!DOCTYPE html>
<html>
    <head>
        <title>Alfonz buzi</title>
        <link rel="stylesheet" type="text/css" href="style.css"/>
    </head>
    <body>
        <h1>
            Egyenes vonalu mozgas
        </h1>

        <div id="container">

            <div id="beallitasok">
                <h4>
                    Beallitasok
                </h4>

                <form>
                    <label>Sebesseg (m/s):</label>
                    <input type="number" step="any" required/>
                    <label>Gyorsulas (m/s²):</label>
                    <input type="number" step="any" required/>
                    <br>
                    <br>
                    <input type="submit" value="Mentes"/>
                </form>
            </div>

            <div id="kepernyo">
                <img id="road1" src="background.jpg">
                <img id="road2" src="background.jpg">
                <img id="car" src="car.png">
            </div>

            <div id="utmutato">
                <h4>
                    Jelenlegi adatok:
                </h4>
                <label>Sebesseg:</label>
                <label id="txtSebesseg">3 m/s</label>
                <br>
                <br>
                <br>
                <label>Gyorsulas:</label>
                <label id="txtGyorsulas">1 m/s²</label>
            </div>

        </div>
        <br>
        <br>
        <br>
        <div id="buttons">
            <img src="btnPlay.png" id="imgPlay"/>
            <img src="btnStop.png" id="imgStop"/>
        </div>

        <script src="script.js"></script>
    </body>
</html>
